name: Build Windows EXE

on:
  push:
    branches: [ main ]  # This runs every time you push to 'main'
  workflow_dispatch:    # This lets you run it manually from the "Actions" tab

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --noconsole --name "Unlimited_Voice_Box" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Voice-App
        path: dist/Unlimited_Voice_Box.exe